name: Build desktop downloads

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set app version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            "APP_VERSION=$($env:GITHUB_REF_NAME.TrimStart('v'))" >> $env:GITHUB_ENV
          } else {
            "APP_VERSION=0.1.0" >> $env:GITHUB_ENV
          }

      - name: Build portable Windows app
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\windows\PCOptimizer.iss"

      - name: Upload Windows downloads
        uses: actions/upload-artifact@v4
        with:
          name: windows-downloads
          path: |
            dist/PCOptimizer-Windows-Portable.zip
            dist/installer/PCOptimizer-Windows-Setup.exe

  build-macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build macOS app
        run: bash scripts/build_macos.sh

      - name: Upload macOS download
        uses: actions/upload-artifact@v4
        with:
          name: macos-download
          path: dist/PCOptimizer-macOS.zip

  release:
    name: Publish Windows GitHub release
    needs:
      - build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows build artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-downloads
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --title "PC Optimizer $TAG_NAME" \
              --notes "Desktop downloads for PC Optimizer. For Windows, use PCOptimizer-Windows-Setup.exe unless you prefer the portable zip."
          fi
